<!-- ===================== Payment Modal ===================== -->

<div
        id="paymentModal"
        class="fixed inset-0 z-[9999] hidden  items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title">

    <!-- Card -->
    <div class="relative flex w-full max-w-md max-h-[90dvh] flex-col overflow-hidden rounded-3xl bg-white shadow-2xl animate-payment-modal">

        <!-- ================= Header ================= -->
        <div class="flex items-start justify-between p-5">
            <div>
                <h2 class="text-xl font-bold text-gray-900">
                    پرداخت آنلاین
                </h2>
            </div>

            <button
                    id="closePaymentModal"
                    class="flex h-9 w-9 items-center justify-center rounded-full text-gray-500 transition hover:bg-gray-100 hover:text-gray-700">
                ✕
            </button>
        </div>

        <!-- ================= Body ================= -->
        <div class="space-y-4 px-5 pb-5">

            <!-- Payment Type -->
            <div>
                <label for="paymentTypeSelect" class="block mb-2 text-sm font-semibold text-gray-700">
                    نوع پرداخت
                </label>
                <select id="paymentTypeSelect" class="w-full"></select>
            </div>

            <!-- Payment Account -->
            <div>
                <label for="paymentAccountSelect" class="block mb-2 text-sm font-semibold text-gray-700">
                    صندوق پرداخت
                </label>
                <select id="paymentAccountSelect" class="w-full"></select>
            </div>

            <!-- Amount -->
            <div>
                <label for="paymentAmount" class="mb-2 block text-sm font-semibold text-gray-700">
                    مبلغ (تومان)
                </label>
                <div class="relative">
                    <input
                            id="paymentAmount"
                            type="text"
                            autocomplete="off"
                            placeholder="مثلاً 500,000"
                            class="h-11 w-full rounded-xl border border-gray-300 px-4 pr-16 outline-none transition focus:border-blue-600 focus:ring-4 focus:ring-blue-100">
                    <span class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-sm text-gray-400">
                        تومان
                    </span>
                </div>
            </div>

            <!-- Description -->
            <div>
                <label for="paymentDescription" class="mb-2 block text-sm font-semibold text-gray-700">
                    توضیحات (اختیاری)
                </label>
                <textarea
                        id="paymentDescription"
                        rows="1"
                        maxlength="500"
                        placeholder="در صورت تمایل توضیحی وارد کنید..."
                        class="w-full min-h-[44px] resize-none rounded-xl border border-gray-300 px-4 py-3 outline-none transition focus:border-blue-600 focus:ring-4 focus:ring-blue-100"></textarea>
            </div>

        </div>

        <!-- ================= Footer ================= -->
        <div class="flex gap-3 border-t px-5 py-4">
            <button id="submitPayment" type="button"
                    class="cursor-pointer flex h-11 flex-1 items-center justify-center gap-2 rounded-xl bg-blue-900 font-bold text-white transition hover:bg-blue-800">
                <span id="submitPaymentText">پرداخت</span>
                <svg id="submitPaymentLoading" class="hidden h-5 w-5 animate-spin" xmlns="http://www.w3.org/2000/svg"
                     fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                    <path class="opacity-100" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4z"/>
                </svg>
            </button>
            <button id="cancelPayment" type="button"
                    class="h-12 rounded-xl border border-gray-300 px-6 transition hover:bg-gray-100">
                انصراف
            </button>
        </div>

    </div>
</div>
