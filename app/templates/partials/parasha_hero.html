<section id="parasha-section" class="relative bg-blue-900 text-white overflow-hidden">
    <!-- پس‌زمینه تزئینی (اختیاری) -->
    <div class="absolute inset-0 opacity-10"></div>

    <div class="container mx-auto px-6 py-16 lg:py-24 relative z-10">
        <div class="flex flex-col lg:flex-row items-center">

            <!-- بخش متن -->
            <div class="lg:w-1/2 text-center lg:text-right mb-12 lg:mb-0">
                <span class="bg-blue-700 text-blue-200 px-4 py-1 rounded-full text-sm font-semibold mb-4 inline-block">
                    تازه ترین پاراشای هفته
                </span>

                {% if latest_parasha %}
                <h1 class="text-4xl lg:text-6xl font-extrabold mb-6 leading-tight">
                    {{ latest_parasha.title }}
                </h1>
                <p class="text-lg text-blue-100 mb-10 leading-relaxed max-w-xl">
                    {{ latest_parasha.description[:80] }}...
                </p>
                <div class="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start">
                    <a href="/parasha/{{ latest_parasha.id }}"
                       class="bg-yellow-500 hover:bg-yellow-400 text-blue-900 font-bold py-3 px-8 rounded-lg transition duration-300 text-center">
                        ادامه مطالعه
                    </a>
                    <a href="#"
                       class="border border-white hover:bg-white hover:text-blue-900 font-bold py-3 px-8 rounded-lg transition duration-300 text-center">
                        آرشیو پاراشاها
                    </a>
                </div>
                {% else %}
                <h1 class="text-4xl font-bold mb-6">در حال آماده‌سازی محتوا...</h1>
                {% endif %}
            </div>

            <!-- بخش تصویر پاراشا -->
            <!-- بخش تصویر پاراشا -->
            <div class="lg:w-1/2 flex justify-center">
                <div class="relative">
                    <!-- هاله نوری پشت عکس -->
                    <div class="absolute -inset-4 bg-blue-500 rounded-full blur-2xl opacity-20 animate-pulse"></div>

                    {% if latest_parasha and latest_parasha %}
                    <a href="/parasha/{{ latest_parasha.id }}">
                        <img
                                src="/{{ latest_parasha.image_url }}"
                                alt="{{ latest_parasha.title }}"
                                class="relative w-80 h-80 lg:w-[450px] lg:h-[450px] object-cover rounded-2xl shadow-2xl border-4 border-blue-800 transform rotate-2 hover:rotate-0 transition duration-500">
                          </a>
                        {% else %}

                    <div class="relative w-80 h-80 bg-blue-800 rounded-2xl flex items-center justify-center border-4 border-dashed border-blue-700 text-blue-300">
                        تصویری موجود نیست
                    </div>
                    {% endif %}
                </div>
            </div>

        </div>
    </div>
</section>
