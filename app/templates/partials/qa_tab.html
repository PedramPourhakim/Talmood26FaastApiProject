<div id="qa-tab" class="tab-content hidden">
    <div class="flex flex-wrap gap-3 mb-6">

        <select
                aria-label="Select an option"
                id="qa-filter"
                class="border rounded-xl px-4 py-2">

            <option value="">
                همه سوالات
            </option>

            <option value="true">
                پاسخ داده شده
            </option>

            <option value="false">
                در انتظار پاسخ
            </option>

        </select>

    </div>
    <div class="bg-white rounded-3xl shadow-xl p-8">

        <h2 class="text-2xl font-bold text-blue-900 mb-8">

            سوابق پرسش و پاسخ شخص :
            <strong>
                {{ current_user.name }}
                {{ current_user.family_name }}
            </strong>

        </h2>

        <div
                id="qa-table-body"
                class="space-y-8">

        </div>

    </div>
    <div
            class="flex justify-center items-center gap-4 mt-8">

        <button
                id="prev-page-btn"
                class="bg-gray-200 px-4 py-2 rounded-xl cursor-pointer">

            قبلی

        </button>

        <span id="page-number">

        صفحه 1

    </span>

        <button
                id="next-page-btn"
                class="bg-blue-800 text-white px-4 py-2 rounded-xl cursor-pointer">

            بعدی

        </button>

    </div>
</div>
<div id="edit-qa-modal"
     class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">

    <div class="bg-white rounded-2xl p-8 w-full max-w-xl">

        <h2
                id="edit-modal-title"
                class="text-2xl font-bold text-blue-900 mb-5">

            ویرایش سوال

        </h2>

        <textarea
                aria-label="editor content"
                id="edit-question"
                rows="6"
                class="w-full border rounded-xl p-4"
                placeholder="">
        </textarea>


        <div class="flex gap-3 mt-5">

            <button
                    id="save-edit-btn"
                    class="bg-blue-900 text-white px-6 py-3 rounded-xl cursor-pointer">
                ذخیره
            </button>

            <button
                    id="close-edit-btn"
                    class="bg-gray-200 px-6 py-3 rounded-xl cursor-pointer">

                انصراف

            </button>

        </div>

    </div>

</div>

<div id="text-modal"
     class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">

    <div class="bg-white rounded-2xl p-8 max-w-3xl w-full mx-4">

        <h2 class="text-2xl font-bold text-blue-900 mb-5">
            متن کامل
        </h2>

        <div id="full-text"
             class="leading-9 max-h-[70vh] overflow-y-auto whitespace-pre-wrap">
        </div>

        <div class="mt-6">

            <button
                    id="close-text-modal"
                    class="bg-blue-900 text-white px-6 py-3 rounded-xl cursor-pointer">

                بستن

            </button>

        </div>

    </div>

</div>
